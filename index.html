<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagnostico de Aprendizaje</title>
    <style>
      :root {
        --bg-a: #f4f7fb;
        --bg-b: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --card: #ffffff;
        --line: #e2e8f0;
        --brand: #0f172a;
        --brand-2: #0f766e;
        --ok: #14532d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Inter", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 0% 0%, #dbeafe 0%, transparent 38%),
          radial-gradient(circle at 100% 100%, #ccfbf1 0%, transparent 35%), linear-gradient(135deg, var(--bg-a), var(--bg-b));
        min-height: 100vh;
      }

      .container {
        width: min(1080px, 92vw);
        margin: 28px auto;
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      .section {
        padding: 24px;
      }

      .pill {
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 8px 12px;
        border-radius: 999px;
        color: white;
        background: var(--brand);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .title {
        margin-top: 14px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.1;
      }

      .subtitle {
        margin-top: 10px;
        color: var(--muted);
        max-width: 78ch;
      }

      .grid-3 {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .mini {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: #fcfdff;
      }

      .mini b {
        display: block;
        margin-top: 6px;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 13px;
        color: #334155;
        background: #f8fafc;
        text-decoration: none;
      }

      .chip:hover {
        background: #eef2f7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-primary {
        color: #fff;
        background: var(--brand);
      }

      .btn-primary:hover {
        transform: translateY(-1px);
        opacity: 0.94;
      }

      .btn-secondary {
        color: var(--text);
        border: 1px solid var(--line);
        background: #fff;
      }

      .btn-secondary:hover {
        background: #f8fafc;
      }

      .q-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .progress {
        margin: 12px 0 18px;
        width: 100%;
        height: 10px;
        background: #e2e8f0;
        border-radius: 999px;
        overflow: hidden;
      }

      .progress > span {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #0f172a, #0f766e);
        transition: width 0.3s ease;
      }

      .q-title {
        font-size: clamp(22px, 2.7vw, 32px);
        line-height: 1.25;
      }

      .options {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }

      .option {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        background: #fff;
        text-align: left;
      }

      .option.active {
        border-color: #0f172a;
        color: white;
        background: #0f172a;
      }

      .result-grid {
        display: grid;
        gap: 14px;
      }

      .banner {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid #99f6e4;
        background: #f0fdfa;
        border-radius: 12px;
      }

      .bars {
        margin-top: 6px;
        display: grid;
        gap: 12px;
      }

      .bar-row {
        display: grid;
        gap: 6px;
      }

      .bar-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .bar-track {
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: #e2e8f0;
      }

      .bar-fill {
        display: block;
        height: 100%;
        width: 0;
        border-radius: 999px;
        background: linear-gradient(90deg, #0f172a, #0f766e);
        transition: width 0.6s ease;
      }

      .cols-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .box {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }

      .dark {
        background: #0f172a;
        border-color: #0f172a;
        color: #f8fafc;
      }

      ul {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      li + li {
        margin-top: 6px;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .grid-3,
        .cols-2 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

],

options: [
  { text: "Un plan visual semanal con bloques de estudio y objetivos claros", category: "visual" },

],
        },
      ];

      const state = {

      function renderContact(el, title) {
        el.innerHTML = `

        `;
      }

      function scoreAnswers() {
        const scores = { visual: 0, auditory: 0, reading: 0, kinesthetic: 0 };
        for (const a of state.answers) {
          if (a) scores[a] += 1;
        }
        return scores;
      }

      function getRanking() {
        const scores = scoreAnswers();
        return Object.entries(scores)
          .map(([key, value]) => ({
            key,
            score: value,
            percent: Math.round((value / questions.length) * 100),
            ...categories[key],
          }))
          .sort((a, b) => b.score - a.score);
      }

        `;

        };
      }

      function renderQuiz() {
        const q = questions[state.step];
        const selected = state.answers[state.step];
        const progress = Math.round(((state.step + 1) / questions.length) * 100);

        app.innerHTML = `
          <div class="q-head">
            <span class="pill">Encuesta</span>
            <small class="muted">Pregunta ${state.step + 1} de ${questions.length}</small>
          </div>
          <div class="progress"><span style="width:${progress}%"></span></div>
          <h2 class="q-title">${q.prompt}</h2>
          <div class="options">
            ${q.options
              .map(
                (opt, i) => `
              <button class="option ${selected === opt.category ? "active" : ""}" data-i="${i}" data-category="${opt.category}">
                ${opt.text}
              </button>
            `
              )
              .join("")}
          </div>
          <div class="actions" style="margin-top:14px;">
            <button class="btn-secondary" id="back" ${state.step === 0 ? "disabled" : ""}>Anterior</button>
            <button class="btn-primary" id="next" ${selected ? "" : "disabled"}>${state.step === questions.length - 1 ? "Ver resultados" : "Siguiente"}</button>
          </div>
        `;

        document.querySelectorAll(".option").forEach((btn) => {
          btn.addEventListener("click", () => {
            const chosen = btn.dataset.category;
            if (!chosen) return;
            state.answers[state.step] = chosen;
            renderQuiz();
          });
        });

        document.getElementById("back").onclick = () => {
          if (state.step > 0) state.step -= 1;
          render();
        };

        document.getElementById("next").onclick = () => {
          if (!state.answers[state.step]) return;
          if (state.step === questions.length - 1) {
            state.screen = "result";
          } else {
            state.step += 1;
          }
          render();
        };
      }

                    </div>
                    <div class="bar-track"><span class="bar-fill" style="width:${r.percent}%"></span></div>
                    <small class="muted">${r.short}</small>
                  </div>
                `
                  )
                  .join("")}
              </div>
            </article>

            <article class="box">
              <h3>Lectura cientifica de tu diagnostico</h3>
              <ul>
                <li><b>Canal dominante:</b> ${top1.label} (diferencia de ${profileGap} punto/s frente al segundo perfil).</li>

                <h3>Anti patron principal a evitar</h3>
                <p class="muted">${top1.avoid}</p>

                </ul>
              </article>
            </section>

            <article class="box">
              <h3>Tu sistema de aprendizaje para las prÃ³ximas 2 semanas</h3>
              <ul>
                <li><b>Prevision:</b> define problema diario SMART y el por que (motivacion intrinseca).</li>
                <li><b>Ejecucion:</b> bloque 50/10 + active recall + una practica real por sesion.</li>
                <li><b>Reflexion:</b> diario de errores, ajuste del metodo y siguiente experimento.</li>
                <li><b>Semana 1:</b> base con ${top1.label}. <b>Semana 2:</b> ${hasMeasuredSecondary ? `integrar ${top2.label} + intercalado.` : "rotar Visual/Auditivo/Lectura/Practico para construir perfil multimodal."}</li>
              </ul>
            </article>

            <div class="actions">
              <button class="btn-secondary" id="restart">Repetir cuestionario</button>
              <button class="btn-primary" id="home">Volver al inicio</button>
            </div>
          </div>
        `;

        document.getElementById("restart").onclick = () => {
          state.step = 0;
          state.answers = Array(questions.length).fill(null);
          state.screen = "quiz";
          render();
        };
        document.getElementById("home").onclick = () => {
          state.step = 0;
          state.answers = Array(questions.length).fill(null);
          state.screen = "welcome";
          render();
        };
      }

      function render() {
        renderContact(contactTop, "");
        renderFooterMessage(contactBottom);
        if (state.screen === "welcome") return renderWelcome();
        if (state.screen === "quiz") return renderQuiz();
        return renderResult();
      }

      render();
    </script>
  </body>
</html>
